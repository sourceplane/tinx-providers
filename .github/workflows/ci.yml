name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - provider_dir: providers/setup-kubectl
            runs_on: ubuntu-latest
            provider_name: setup-kubectl
            main: ./cmd/kiox-provider-kubectl
            tool: kubectl
            smoke_command: kubectl version --client -o json
            kubectl_version: v1.30.6
          - provider_dir: providers/setup-azure-cli
            runs_on: macos-latest
            provider_name: setup-azure-cli
            main: ./cmd/kiox-provider-azure-cli
            tool: az
            smoke_command: az version --output json
            azure_cli_version: 2.85.0
          - provider_dir: providers/setup-helm
            runs_on: ubuntu-latest
            provider_name: setup-helm
            main: ./cmd/kiox-provider-helm
            tool: helm
            smoke_command: helm version --template '{{ .Version }}'
            helm_version: v4.1.4
          - provider_dir: providers/setup-kustomize
            runs_on: ubuntu-latest
            provider_name: setup-kustomize
            main: ./cmd/kiox-provider-kustomize
            tool: kustomize
            smoke_command: kustomize version
            kustomize_version: v5.8.1
          - provider_dir: providers/setup-terraform
            runs_on: ubuntu-latest
            provider_name: setup-terraform
            main: ./cmd/kiox-provider-terraform
            tool: terraform
            smoke_command: terraform version -json
            terraform_version: 1.14.8
          - provider_dir: providers/setup-gcloud
            runs_on: ubuntu-latest
            provider_name: setup-gcloud
            main: ./cmd/kiox-provider-gcloud
            tool: gcloud
            smoke_command: gcloud version --format=json
            gcloud_version: 565.0.0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work

      - name: Install kiox
        run: |
          mkdir -p "$HOME/.local/bin"
          GOBIN="$HOME/.local/bin" go install github.com/sourceplane/kiox/cmd/kiox@latest
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/kiox" version

      - name: Run Go tests
        working-directory: ${{ matrix.provider_dir }}
        run: go test ./...

      - name: Validate release build
        working-directory: ${{ matrix.provider_dir }}
        run: |
          kiox release \
            --manifest provider.yaml \
            --main "${{ matrix.main }}" \
            --output oci \
            --dist dist \
            --tag ci

      - name: Smoke test transient providers
        working-directory: ${{ matrix.provider_dir }}
        env:
          KUBECTL_VERSION: ${{ matrix.kubectl_version }}
          AZURE_CLI_VERSION: ${{ matrix.azure_cli_version }}
          HELM_VERSION: ${{ matrix.helm_version }}
          KUSTOMIZE_VERSION: ${{ matrix.kustomize_version }}
          TERRAFORM_VERSION: ${{ matrix.terraform_version }}
          GCLOUD_VERSION: ${{ matrix.gcloud_version }}
        run: |
          workspace_dir=$(mktemp -d)
          trap 'rm -rf "$workspace_dir"' EXIT
          kiox init "$workspace_dir" -p "$PWD/oci" as "${{ matrix.tool }}"
          kiox --workspace "$workspace_dir" ls
          kiox --workspace "$workspace_dir" status
          kiox --workspace "$workspace_dir" -- ${{ matrix.smoke_command }}

      - name: Smoke test workspace manifest
        working-directory: ${{ matrix.provider_dir }}
        env:
          KUBECTL_VERSION: ${{ matrix.kubectl_version }}
          AZURE_CLI_VERSION: ${{ matrix.azure_cli_version }}
          HELM_VERSION: ${{ matrix.helm_version }}
          KUSTOMIZE_VERSION: ${{ matrix.kustomize_version }}
          TERRAFORM_VERSION: ${{ matrix.terraform_version }}
          GCLOUD_VERSION: ${{ matrix.gcloud_version }}
        run: |
          workspace_dir=$(mktemp -d "$PWD/.kiox-smoke.XXXXXX")
          trap 'rm -rf "$workspace_dir"' EXIT
          cp examples/workspace.local.kiox.yaml "$workspace_dir/kiox.yaml"
          kiox init "$workspace_dir"
          kiox --workspace "$workspace_dir" ls
          kiox --workspace "$workspace_dir" status
          kiox --workspace "$workspace_dir" -- ${{ matrix.smoke_command }}
