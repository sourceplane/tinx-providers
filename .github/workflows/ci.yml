name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: providers/setup-kubectl
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: providers/setup-kubectl/go.mod

      - name: Run Go tests
        run: go test ./...

      - name: Validate release build
        uses: sourceplane/tinx-release-action@v1
        with:
          working-directory: providers/setup-kubectl
          manifest: provider.yaml
          main: ./cmd/tinx-provider-kubectl
          output: oci
          dist: dist
          tag: ci
