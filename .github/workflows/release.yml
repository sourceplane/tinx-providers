name: Release provider

on:
  workflow_dispatch:
    inputs:
      provider_dir:
        description: Provider directory under providers/
        required: true
        default: providers/setup-kubectl
      tag:
        description: Semantic version tag to package
        required: true
        default: v0.1.0
  push:
    tags:
      - providers/*/v*

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work

      - id: meta
        name: Resolve release metadata
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            provider_dir="${{ inputs.provider_dir }}"
            tag="${{ inputs.tag }}"
          else
            provider_dir="${GITHUB_REF_NAME%/v*}"
            tag="${GITHUB_REF_NAME##*/}"
          fi

          provider_slug="${provider_dir#providers/}"
          tool_name="${provider_slug#setup-}"
          provider_name="tinx-${provider_slug}"
          main="./cmd/tinx-provider-${tool_name}"
          owner=$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          push_ref="ghcr.io/${owner}/${provider_name}:${tag}"

          echo "provider_dir=$provider_dir" >> "$GITHUB_OUTPUT"
          echo "provider_name=$provider_name" >> "$GITHUB_OUTPUT"
          echo "main=$main" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "push_ref=$push_ref" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Release provider
        uses: sourceplane/tinx-release-action@v2
        with:
          working-directory: ${{ steps.meta.outputs.provider_dir }}
          manifest: provider.yaml
          main: ${{ steps.meta.outputs.main }}
          output: oci
          dist: dist
          tag: ${{ steps.meta.outputs.tag }}
          push: ${{ steps.meta.outputs.push_ref }}
