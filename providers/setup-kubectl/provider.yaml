apiVersion: kiox.io/v1
kind: Provider
metadata:
  namespace: sourceplane
  name: setup-kubectl
  version: v0.2.0
  description: Lazily installs kubectl into kiox workspaces using a bundled Go installer.
spec:
  bundles:
    - name: setup-kubectl
      layers:
        - platform:
            os: darwin
            arch: amd64
          mediaType: application/vnd.kiox.tool.binary
          source: dist/bin/darwin/amd64/kiox-provider-kubectl
        - platform:
            os: darwin
            arch: arm64
          mediaType: application/vnd.kiox.tool.binary
          source: dist/bin/darwin/arm64/kiox-provider-kubectl
        - platform:
            os: linux
            arch: amd64
          mediaType: application/vnd.kiox.tool.binary
          source: dist/bin/linux/amd64/kiox-provider-kubectl
        - platform:
            os: linux
            arch: arm64
          mediaType: application/vnd.kiox.tool.binary
          source: dist/bin/linux/arm64/kiox-provider-kubectl
        - platform:
            os: linux
            arch: arm
          mediaType: application/vnd.kiox.tool.binary
          source: dist/bin/linux/arm/kiox-provider-kubectl
        - platform:
            os: windows
            arch: amd64
          mediaType: application/vnd.kiox.tool.binary
          source: dist/bin/windows/amd64/kiox-provider-kubectl.exe
        - platform:
            os: windows
            arch: arm64
          mediaType: application/vnd.kiox.tool.binary
          source: dist/bin/windows/arm64/kiox-provider-kubectl.exe
  environments:
    - name: kubectl-env
      variables:
        KUBECTL_PROVIDER_REF: ${provider_ref}
      export:
        - KUBECTL_PROVIDER_REF
  tools:
    - name: setup-kubectl
      runtime: oci
      from: bundle.setup-kubectl
      provides:
        - setup-kubectl
    - name: kubectl
      default: true
      runtime: local
      install:
        tool: setup-kubectl
        path: bin/kubectl
      dependsOn:
        - tool: setup-kubectl
      provides:
        - kubectl
      environments:
        - kubectl-env
