apiVersion: kiox.io/v1
kind: Provider
metadata:
  namespace: sourceplane
  name: kiox-setup-kustomize
  version: v0.1.0
  description: Lazily installs kustomize into the active Kiox workspace using a bundled Go runtime.
spec:
  bundles:
    - name: setup-kustomize
      layers:
        - platform:
            os: darwin
            arch: amd64
          mediaType: application/vnd.kiox.tool.binary
          source: dist/bin/darwin/amd64/kiox-provider-kustomize
        - platform:
            os: darwin
            arch: arm64
          mediaType: application/vnd.kiox.tool.binary
          source: dist/bin/darwin/arm64/kiox-provider-kustomize
        - platform:
            os: linux
            arch: amd64
          mediaType: application/vnd.kiox.tool.binary
          source: dist/bin/linux/amd64/kiox-provider-kustomize
        - platform:
            os: linux
            arch: arm64
          mediaType: application/vnd.kiox.tool.binary
          source: dist/bin/linux/arm64/kiox-provider-kustomize
        - platform:
            os: windows
            arch: amd64
          mediaType: application/vnd.kiox.tool.binary
          source: dist/bin/windows/amd64/kiox-provider-kustomize.exe
        - platform:
            os: windows
            arch: arm64
          mediaType: application/vnd.kiox.tool.binary
          source: dist/bin/windows/arm64/kiox-provider-kustomize.exe
  environments:
    - name: kustomize-env
      variables:
        KUSTOMIZE_PROVIDER_REF: ${provider_ref}
      export:
        - KUSTOMIZE_PROVIDER_REF
  tools:
    - name: setup-kustomize
      runtime: oci
      from: bundle.setup-kustomize
      provides:
        - setup-kustomize
    - name: kustomize
      default: true
      runtime: local
      install:
        tool: setup-kustomize
        path: bin/kustomize
      dependsOn:
        - tool: setup-kustomize
      provides:
        - kustomize
      environments:
        - kustomize-env